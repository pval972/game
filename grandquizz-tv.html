<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LE GRAND QUIZZ — TV</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--dark:#060610;--card:#0d0d1f;--border:#1e1e3a;--text:#dde2f0;--gold:#f5c842;--gold2:#e8a020;--silver:#8899bb;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;}

#bg{position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 70% 60% at 10% 40%,rgba(20,10,70,.8) 0%,transparent 70%),
    radial-gradient(ellipse 50% 50% at 90% 20%,rgba(5,20,60,.7) 0%,transparent 70%),
    #060610;}
#bg::before{content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 5% 10%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 20% 70%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 45% 30%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(2px 2px at 70% 60%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 88% 20%,rgba(255,255,255,.5) 0%,transparent 100%);}

/* ── LAYOUT ── */
#app{position:relative;z-index:5;width:100%;height:100%;display:flex;flex-direction:column;}

/* ── HEADER ── */
#header{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 20px;
  background:linear-gradient(180deg,rgba(0,0,0,.8) 0%,transparent 100%);
  border-bottom:1px solid rgba(245,200,66,.12);
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:6px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 16px rgba(245,200,66,.4));}
#scoreboard{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.pscore{background:#12122a;border:2px solid;border-radius:9px;padding:5px 13px;text-align:center;min-width:85px;transition:all .4s;}
.pscore.leader{box-shadow:0 0 14px rgba(245,200,66,.25);}
.pscore .pname{font-size:.58rem;color:#aab0cc;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;}
.pscore .ppts{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;}

/* ── TURN BANNER ── */
#turn-banner{
  flex-shrink:0;display:none;
  align-items:center;justify-content:center;
  padding:8px 20px;
  background:rgba(0,0,0,.5);
}
#turn-inner{
  display:inline-flex;align-items:center;gap:16px;
  padding:10px 40px;
  border-radius:100px;
  border:2.5px solid currentColor;
  background:rgba(0,0,0,.75);
  font-family:'Bebas Neue',sans-serif;letter-spacing:5px;
  animation:turn-pop .35s cubic-bezier(.34,1.56,.64,1) both;
  box-shadow:0 0 30px currentColor, 0 0 60px rgba(0,0,0,.8);
}
#turn-inner .t-name{
  font-size:3rem;
  filter:drop-shadow(0 0 10px currentColor);
}
#turn-inner .t-label{
  font-size:1.5rem;
  opacity:.75;
  letter-spacing:4px;
}
@keyframes turn-pop{from{transform:scale(.6) translateY(-10px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}

/* ── GRID ── */
#grid-wrap{
  flex:1;min-height:0;
  display:flex;flex-direction:column;
  padding:4px 8px 2px;
}
#qleft{font-size:.6rem;color:#3a3a55;letter-spacing:3px;text-transform:uppercase;margin-bottom:3px;flex-shrink:0;}
#grid{
  flex:1;min-height:0;
  display:grid;
  grid-template-columns:repeat(10,1fr);
  grid-template-rows:repeat(10,1fr);
  gap:3px;
  width:100%;
}
.cell{
  border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(.5rem,1.4vw,1rem);
  transition:all .4s ease;
  border:1.5px solid transparent;
  overflow:hidden;
}
.cell.neutral{background:var(--card);border-color:var(--border);color:#3a3a55;}
.cell.avail{color:#ffffff;background:#0b0b1e;border-color:#1e1e38;}
.cell.colored{color:#fff;font-weight:700;}
.cell.active{animation:cell-pulse .7s infinite;color:var(--dark)!important;border-color:transparent!important;z-index:2;}
@keyframes cell-pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,255,255,.5);}50%{transform:scale(1.06);box-shadow:0 0 0 6px rgba(255,255,255,0);}}
.cell.used{opacity:.12;background:#040408!important;border-color:transparent!important;color:#111!important;}

/* ── LEGEND ── */
#legend{flex-shrink:0;display:flex;gap:10px;justify-content:center;align-items:center;padding:2px 0;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.65rem;}
.legend-dot{width:8px;height:8px;border-radius:50%;}

/* ── BOTTOM SCORES ── */
#bottom{flex-shrink:0;display:flex;gap:5px;justify-content:center;padding:3px 20px 6px;flex-wrap:wrap;}
.bscore{border-radius:9px;padding:6px 12px;text-align:center;min-width:100px;border:2px solid;transition:all .4s;background:#0e0e22;}
.bscore.leader{box-shadow:0 0 14px rgba(245,200,66,.2);}
.bscore .bn{font-size:.6rem;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:1px;font-weight:700;color:#ccc;}
.bscore .bp{font-family:'Bebas Neue',sans-serif;font-size:1.55rem;}

/* ── FLASH OVERLAY ── */
#flash-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(4,4,14,.96);flex-direction:column;padding:8px 8px 6px;}
#flash-overlay.show{display:flex;}
.flash-header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding:0 4px 6px;}
.flash-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:6px;color:var(--gold);filter:drop-shadow(0 0 20px rgba(245,200,66,.4));}
.flash-sub{font-size:.8rem;color:#555;letter-spacing:2px;text-transform:uppercase;}
#flash-timer{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--gold);line-height:1;filter:drop-shadow(0 0 12px rgba(245,200,66,.5));animation:t-pulse 1s infinite;min-width:60px;text-align:right;}
#flash-grid{flex:1;min-height:0;display:grid;grid-template-columns:repeat(10,1fr);grid-template-rows:repeat(10,1fr);gap:3px;width:100%;}
.flash-cell{border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:clamp(.5rem,1.4vw,1rem);font-weight:700;color:#fff;}
@keyframes t-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}

/* ── SPINNER ── */
#spinner{display:none;position:fixed;inset:0;z-index:200;background:rgba(4,4,14,.97);flex-direction:column;align-items:center;justify-content:center;gap:18px;}
#spinner.show{display:flex;}
.spin-wrap{width:180px;height:180px;position:relative;display:flex;align-items:center;justify-content:center;}
.spin-ring{position:absolute;inset:0;border-radius:50%;border:4px solid #1a1a2e;border-top-color:var(--gold);animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin-num{font-family:'Bebas Neue',sans-serif;font-size:4.5rem;color:var(--gold);position:relative;z-index:1;filter:drop-shadow(0 0 14px rgba(245,200,66,.5));}
.spin-label{font-size:.75rem;color:#555;letter-spacing:3px;text-transform:uppercase;}

/* ── QUESTION SCREEN ── */
#qscreen{display:none;position:fixed;inset:0;z-index:400;background:rgba(4,4,14,.98);flex-direction:column;align-items:center;justify-content:center;padding:32px 56px;gap:0;}
#qscreen.show{display:flex;}
.q-meta{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;justify-content:center;}
.q-mode-pill{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:4px;padding:6px 20px;border-radius:100px;}
.q-mode-pill.cash{background:#15803d;color:#fff;box-shadow:0 0 18px rgba(21,128,61,.4);}
.q-mode-pill.carre{background:#1d4ed8;color:#fff;box-shadow:0 0 18px rgba(29,78,216,.4);}
.q-mode-pill.duo{background:#7e22ce;color:#fff;box-shadow:0 0 18px rgba(126,34,206,.4);}
.q-cat-pill{font-size:.72rem;color:#888;letter-spacing:2px;text-transform:uppercase;padding:6px 13px;border-radius:100px;border:1px solid #252545;}
.q-owner-pill{font-size:.72rem;font-weight:700;padding:6px 13px;border-radius:100px;}
.q-bonus{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:3px;padding:6px 14px;border-radius:100px;background:rgba(245,200,66,.15);border:1px solid rgba(245,200,66,.4);color:var(--gold);animation:bonus-glow 1.5s infinite;}
@keyframes bonus-glow{0%,100%{box-shadow:0 0 0 0 rgba(245,200,66,.3);}50%{box-shadow:0 0 0 8px rgba(245,200,66,0);}}
#q-text{font-size:2rem;font-weight:700;text-align:center;line-height:1.3;color:#fff;max-width:860px;margin-bottom:26px;}
#q-answers{display:grid;gap:10px;width:100%;max-width:820px;}
#q-answers.g2{grid-template-columns:1fr 1fr;}
#q-answers.g4{grid-template-columns:1fr 1fr;}
.ans-card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:16px 22px;font-size:1.05rem;font-weight:500;display:flex;align-items:center;gap:12px;transition:all .3s;}
.ans-card .ltr{width:32px;height:32px;border-radius:50%;background:#191930;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:#666;}
.ans-card.correct{background:rgba(21,128,61,.2);border-color:#22c55e;}
.ans-card.correct .ltr{background:#22c55e;color:#fff;}
.ans-card.wrong{border-color:#ef444433;opacity:.35;}
.cash-free{text-align:center;padding:24px;border:1px dashed #222;border-radius:14px;color:#444;font-size:.95rem;font-style:italic;width:100%;max-width:600px;}

/* ── ANSWER REVEAL ── */
#answer-reveal{display:none;margin-top:16px;padding:16px 40px;border-radius:14px;text-align:center;}
#answer-reveal.ok{display:block;background:rgba(21,128,61,.18);border:2.5px solid #22c55e;animation:slide-up .4s ease;}
#answer-reveal.ko{display:block;background:rgba(239,68,68,.1);border:2.5px solid #ef4444;animation:slide-up .4s ease;}
.ar-verdict{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;margin-bottom:4px;}
.ar-verdict.ok-col{color:#22c55e;}
.ar-verdict.ko-col{color:#ef4444;}
.ar-answer{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;}
.ar-answer.ok-col{color:#22c55e;}
.ar-answer.ko-col{color:#22c55e;}/* toujours vert = bonne réponse */

/* ── WINNER ── */
#winner{display:none;position:fixed;inset:0;z-index:600;background:rgba(4,4,14,.98);flex-direction:column;align-items:center;justify-content:center;gap:12px;}
#winner.show{display:flex;}
.w-trophy{font-size:5.5rem;animation:bounce 1.2s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-18px);}}
.w-name{font-family:'Bebas Neue',sans-serif;font-size:5rem;letter-spacing:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.w-sub{font-size:1.1rem;color:#888;}
.w-podium{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:10px;}
.w-card{border-radius:14px;padding:14px 20px;text-align:center;min-width:110px;background:var(--card);border:1px solid var(--border);}
.w-rank{font-size:1.4rem;margin-bottom:3px;}
.w-pname{font-size:.65rem;color:#666;text-transform:uppercase;letter-spacing:1px;}
.w-pts{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--gold);}

/* ── SETUP ── */
#setup{position:fixed;inset:0;z-index:700;background:radial-gradient(ellipse at 30% 40%,#14143a 0%,#060610 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
.setup-logo{font-family:'Bebas Neue',sans-serif;font-size:5rem;letter-spacing:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 36px rgba(245,200,66,.35));}
.setup-sub{font-size:.8rem;color:#444;letter-spacing:4px;text-transform:uppercase;margin-top:-16px;}
.setup-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px 32px;max-width:480px;text-align:center;color:#666;line-height:1.9;font-size:.88rem;}
.setup-box b{color:var(--gold);}
.setup-blink{font-size:.72rem;color:#333;letter-spacing:3px;text-transform:uppercase;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.15;}}
.cf{position:fixed;top:-12px;border-radius:2px;animation:cf-fall linear forwards;z-index:800;}
@keyframes cf-fall{to{transform:translateY(110vh) rotate(900deg);opacity:0;}}
@keyframes slide-down{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
@keyframes slide-up{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div id="bg"></div>

<div id="setup">
  <div class="setup-logo">LE GRAND QUIZZ</div>
  <div class="setup-sub">Qui sera le meilleur ?</div>
  <div class="setup-box">Attendez que le maître du jeu configure les joueurs et lance la partie.</div>
  <div class="setup-blink">En attente du maître du jeu…</div>
</div>

<div id="app">
  <div id="header">
    <div class="logo">LE GRAND QUIZZ</div>
    <div id="scoreboard"></div>
  </div>
  <div id="turn-banner">
    <div id="turn-inner"></div>
  </div>
  <div id="grid-wrap">
    <div id="qleft"></div>
    <div id="grid"></div>
  </div>
  <div id="legend"></div>
  <div id="bottom"></div>
</div>

<div id="flash-overlay">
  <div class="flash-header">
    <div>
      <div class="flash-title" id="flash-title">MÉMORISEZ VOS CASES !</div>
      <div class="flash-sub" id="flash-sub">Vous avez <span id="flash-timer-txt">30</span> secondes…</div>
    </div>
    <div id="flash-timer">30</div>
  </div>
  <div id="flash-grid"></div>
</div>

<div id="spinner">
  <div class="spin-wrap"><div class="spin-ring"></div><div class="spin-num" id="spin-num">?</div></div>
  <div class="spin-label">Chargement de la question…</div>
</div>

<div id="qscreen">
  <div class="q-meta">
    <div id="q-mode-pill" class="q-mode-pill cash">CASH</div>
    <div id="q-cat-pill" class="q-cat-pill"></div>
    <div id="q-owner-pill" class="q-owner-pill"></div>
    <div id="q-bonus" class="q-bonus" style="display:none">✦ BONUS ×2</div>
  </div>
  <div id="q-text"></div>
  <div id="q-answers"></div>
  <div id="answer-reveal">
    <div class="ar-verdict" id="ar-verdict"></div>
    <div class="ar-answer" id="ar-answer"></div>
  </div>
</div>

<div id="winner">
  <div class="w-trophy">🏆</div>
  <div id="w-name" class="w-name"></div>
  <div id="w-sub" class="w-sub"></div>
  <div class="w-podium" id="w-podium"></div>
</div>

<script>
const FIREBASE_URL='https://quizz-8dd48-default-rtdb.firebaseio.com/grandquizz/cmd.json';
let lastTs=0;

// Polling toutes les 500ms — simple et fiable
async function poll(){
  try{
    const r=await fetch(FIREBASE_URL+'?t='+Date.now());
    const d=await r.json();
    if(d?.ts && d.ts>lastTs){lastTs=d.ts;handle(d);}
  }catch(e){}
}
// Lancer le polling immédiatement puis toutes les 500ms
poll();
setInterval(poll,500);

// EventSource en bonus pour la réactivité
function startFirebaseListener(){
  try{
    const es=new EventSource(FIREBASE_URL);
    es.addEventListener('put',e=>{
      try{const d=JSON.parse(e.data);if(d.data?.ts>lastTs){lastTs=d.data.ts;handle(d.data);}}catch(e){}
    });
  }catch(e){}
}
startFirebaseListener();

// ── SONS ──
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx;
function getCtx(){if(!actx)actx=new AudioCtx();return actx;}
function playBip(correct){
  try{
    const ctx=getCtx();
    if(correct){
      [523,784].forEach((freq,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=freq;o.type='sine';
        g.gain.setValueAtTime(0,ctx.currentTime+i*.18);
        g.gain.linearRampToValueAtTime(.4,ctx.currentTime+i*.18+.02);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.18+.3);
        o.start(ctx.currentTime+i*.18);o.stop(ctx.currentTime+i*.18+.3);
      });
    }else{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=180;o.type='sawtooth';
      g.gain.setValueAtTime(.5,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.5);
      o.start(ctx.currentTime);o.stop(ctx.currentTime+.5);
    }
  }catch(e){}
}

// ── STATE ──
let G={players:[],cells:{},used:new Set(),scores:{},currentQ:null,currentOwner:null};

function handle(cmd){
  if(cmd.type==='start')    doStart(cmd);
  if(cmd.type==='flash')    doFlash(cmd);
  if(cmd.type==='recall')   doRecall(cmd);
  if(cmd.type==='turn')     doTurn(cmd);
  if(cmd.type==='spin')     doSpin(cmd);
  if(cmd.type==='question') doQuestion(cmd);
  if(cmd.type==='set_mode')   doSetMode(cmd);
  if(cmd.type==='reveal')   doReveal(cmd);
  if(cmd.type==='next')     doNext(cmd);
  if(cmd.type==='winner')   doWinner(cmd);
}

// ── START ──
function doStart(cmd){
  G.players=cmd.players;G.cells=cmd.cells;G.used=new Set();
  G.scores=Object.fromEntries(cmd.players.map(p=>[p.id,0]));
  document.getElementById('setup').style.display='none';
  buildGrid();renderScores();renderLegend();renderBottom();
  updateQleft();
}

function buildGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  for(let i=1;i<=100;i++){
    const d=document.createElement('div');
    d.id='cell'+i;d.dataset.num=i;
    setCellStyle(d,i);
    g.appendChild(d);
  }
}

function setCellStyle(el,num){
  const info=G.cells[num];
  if(G.used.has(num)){
    el.className='cell used';
    el.textContent=num;
    el.style.cssText='';
    return;
  }
  el.textContent=num;
  el.className='cell avail';
  el.style.background='';el.style.borderColor='';el.style.color='';el.style.boxShadow='';
}

function refreshAllCells(){
  for(let i=1;i<=100;i++){const el=document.getElementById('cell'+i);if(el)setCellStyle(el,i);}
}

function updateQleft(){
  document.getElementById('qleft').textContent=`${100-G.used.size} / 100 cases restantes`;
}

// ── FLASH (mémorisation) ──
function doFlash(cmd){
  buildFlashGrid();
  document.getElementById('flash-title').textContent='MÉMORISEZ VOS CASES !';
  document.getElementById('flash-sub').style.display='';
  document.getElementById('flash-timer').style.display='';
  const overlay=document.getElementById('flash-overlay');
  overlay.classList.add('show');
  let t=cmd.duration||30;
  const el=document.getElementById('flash-timer'),txtEl=document.getElementById('flash-timer-txt');
  el.textContent=t;txtEl.textContent=t;
  const iv=setInterval(()=>{
    t--;el.textContent=t;txtEl.textContent=t;
    if(t<=0){clearInterval(iv);overlay.classList.remove('show');}
  },1000);
}

// ── RECALL (rappel couleurs 5s, overlay seulement) ──
function doRecall(cmd){
  buildFlashGrid();
  document.getElementById('flash-title').textContent='RAPPEL DES COULEURS';
  document.getElementById('flash-sub').style.display='none';
  document.getElementById('flash-timer').style.display='none';
  const overlay=document.getElementById('flash-overlay');
  overlay.classList.add('show');
  setTimeout(()=>{
    overlay.classList.remove('show');
    document.getElementById('flash-sub').style.display='';
    document.getElementById('flash-timer').style.display='';
  },cmd.duration||5000);
}

function buildFlashGrid(){
  const fg=document.getElementById('flash-grid');fg.innerHTML='';
  for(let i=1;i<=100;i++){
    const info=G.cells[i];const d=document.createElement('div');
    d.className='flash-cell';d.textContent=i;
    if(info?.owner){
      const p=G.players.find(x=>x.id===info.owner);
      d.style.background=p.color+'dd';d.style.boxShadow=`0 0 8px ${p.color}55`;
    }else{
      d.style.background='#2a2a40';
    }
    fg.appendChild(d);
  }
}

// ── TOUR DU JOUEUR ──
function doTurn(cmd){
  const p=G.players.find(x=>x.id===cmd.playerId);if(!p)return;
  const banner=document.getElementById('turn-banner');
  const inner=document.getElementById('turn-inner');
  banner.style.display='flex';
  inner.style.color=p.color;
  inner.style.borderColor=p.color;
  inner.style.boxShadow=`0 0 30px ${p.color}88, 0 0 60px rgba(0,0,0,.8)`;
  inner.innerHTML=`
    <span style="font-size:1.8rem;opacity:.6">🎯</span>
    <span class="t-name">${p.name.toUpperCase()}</span>
    <span class="t-label">À TOI DE JOUER !</span>
  `;
}

// ── SPIN ──
function doSpin(cmd){
  // Allumer la case sur la grille
  const el=document.getElementById('cell'+cmd.cell);
  if(el){
    const info=G.cells[cmd.cell];
    const bg=info?.owner?G.players.find(x=>x.id===info.owner).color:'#f5c842';
    el.className='cell active';
    el.style.background=bg;el.style.borderColor=bg;el.style.boxShadow=`0 0 18px ${bg}99`;
  }
  // Animation : numéro qui roule puis s'agrandit et disparaît
  const sp=document.getElementById('spinner'),sn=document.getElementById('spin-num');
  sp.classList.add('show');
  sn.style.transition='none';sn.style.transform='scale(1)';sn.style.opacity='1';
  sn.textContent='?';
  let i=0;
  const iv=setInterval(()=>{
    sn.textContent=Math.floor(Math.random()*100)+1;
    if(++i>20){
      clearInterval(iv);
      sn.textContent=cmd.cell;
      // Agrandir et faire disparaître
      setTimeout(()=>{
        sn.style.transition='transform 0.7s ease-in, opacity 0.7s ease-in';
        sn.style.transform='scale(6)';
        sn.style.opacity='0';
      },400);
    }
  },80);
}

// ── QUESTION ──
function doQuestion(cmd){
  // Reset spin-num animation pour la prochaine fois
  const sn=document.getElementById('spin-num');
  sn.style.transition='none';sn.style.transform='scale(1)';sn.style.opacity='1';
  document.getElementById('spinner').classList.remove('show');
  document.getElementById('answer-reveal').className='';
  G.currentQ=cmd.q;G.currentOwner=cmd.owner;
  const pill=document.getElementById('q-mode-pill');
  // Si mode non défini encore (attente du choix), cacher la pill
  if(!cmd.mode){
    pill.style.display='none';
  } else {
    pill.style.display='';
    pill.className=`q-mode-pill ${cmd.mode}`;
    const pts={cash:cmd.owner?(cmd.showBonus?'20 pts ✦ BONUS':'10 pts'):'5 pts',carre:cmd.owner?'5 pts':'2 pts',duo:cmd.owner?'2 pts':'1 pt'};
    pill.textContent={cash:'CASH',carre:'CARRÉ',duo:'DUO'}[cmd.mode]+' — '+pts[cmd.mode];
  }
  document.getElementById('q-cat-pill').textContent=cmd.q.cat||'Culture Générale';
  const op=document.getElementById('q-owner-pill'),bonus=document.getElementById('q-bonus');
  if(!cmd.owner){
    op.textContent='🌐 Culture Générale';op.style.background='rgba(70,70,100,.3)';op.style.border='1px solid #252545';op.style.color='#888';bonus.style.display='none';
  }else{
    const p=G.players.find(x=>x.id===cmd.owner);
    op.textContent=`🎯 Domaine de ${p.name}`;op.style.background=p.color+'22';op.style.border=`1px solid ${p.color}66`;op.style.color=p.color;
    bonus.style.display=cmd.showBonus?'block':'none';
  }
  document.getElementById('q-text').textContent=cmd.q.q;
  const ac=document.getElementById('q-answers');ac.innerHTML='';
  if(cmd.mode==='cash'){
    ac.className='';ac.innerHTML='<div class="cash-free">Le joueur répond librement…</div>';
  }else{
    const answers=cmd.answers||[];ac.className=answers.length===2?'g2':'g4';
    answers.forEach((ans,i)=>{
      const d=document.createElement('div');d.className='ans-card';d.dataset.val=ans;
      d.innerHTML=`<div class="ltr">${String.fromCharCode(65+i)}</div><span>${ans}</span>`;
      ac.appendChild(d);
    });
  }
  document.getElementById('qscreen').classList.add('show');
}

// ── SET MODE (mise à jour après choix du joueur) ──
function doSetMode(cmd){
  const pill=document.getElementById('q-mode-pill');
  pill.style.display='';
  pill.className=`q-mode-pill ${cmd.mode}`;
  const pts={cash:G.currentOwner?(cmd.showBonus?'20 pts ✦ BONUS':'10 pts'):'5 pts',carre:G.currentOwner?'5 pts':'2 pts',duo:G.currentOwner?'2 pts':'1 pt'};
  pill.textContent={cash:'CASH',carre:'CARRÉ',duo:'DUO'}[cmd.mode]+' — '+pts[cmd.mode];
  // Mettre à jour les réponses affichées
  const ac=document.getElementById('q-answers');ac.innerHTML='';
  if(cmd.mode==='cash'){
    ac.className='';ac.innerHTML='<div class="cash-free">Le joueur répond librement…</div>';
  }else{
    const answers=cmd.answers||[];ac.className=answers.length===2?'g2':'g4';
    answers.forEach((ans,i)=>{
      const d=document.createElement('div');d.className='ans-card';d.dataset.val=ans;
      d.innerHTML=`<div class="ltr">${String.fromCharCode(65+i)}</div><span>${ans}</span>`;
      ac.appendChild(d);
    });
  }
  if(cmd.showBonus){document.getElementById('q-bonus').style.display='block';}
}

// ── REVEAL ──
function doReveal(cmd){
  const q=G.currentQ;
  // Surligner les réponses
  document.querySelectorAll('.ans-card').forEach(card=>{
    if(card.dataset.val===q.a)card.classList.add('correct');
    else card.classList.add('wrong');
  });
  const ar=document.getElementById('answer-reveal');
  const arVerdict=document.getElementById('ar-verdict');
  const arAnswer=document.getElementById('ar-answer');
  if(cmd.correct){
    ar.className='ok';
    arVerdict.className='ar-verdict ok-col';
    arVerdict.textContent='✓ BONNE RÉPONSE !';
    arAnswer.className='ar-answer ok-col';
    arAnswer.textContent=q.a;
    playBip(true);
  }else{
    ar.className='ko';
    arVerdict.className='ar-verdict ko-col';
    arVerdict.textContent='✗ MAUVAISE RÉPONSE';
    arAnswer.className='ar-answer ok-col';
    arAnswer.textContent='La bonne réponse : '+q.a;
    playBip(false);
  }
  if(cmd.scores){G.scores=cmd.scores;renderScores();renderBottom();}
}

// ── NEXT ──
function doNext(cmd){
  document.getElementById('qscreen').classList.remove('show');
  document.getElementById('answer-reveal').className='';
  document.getElementById('turn-banner').style.display='none';
  if(cmd.cell){
    G.used.add(cmd.cell);
    const el=document.getElementById('cell'+cmd.cell);
    if(el){el.className='cell used';el.style.cssText='';}
  }
  updateQleft();
  if(cmd.scores){G.scores=cmd.scores;renderScores();renderBottom();}
}

// ── SCORES ──
function renderScores(){
  const sorted=[...G.players].sort((a,b)=>(G.scores[b.id]||0)-(G.scores[a.id]||0));
  document.getElementById('scoreboard').innerHTML=sorted.map((p,i)=>
    `<div class="pscore${i===0?' leader':''}" style="border-color:${p.color}">
      <div class="pname" style="color:${p.color}">${p.name}</div>
      <div class="ppts" style="color:${p.color}">${G.scores[p.id]||0} pts</div>
    </div>`).join('');
}
function renderLegend(){
  // Légende supprimée — info déjà dans les carrés du bas
  document.getElementById('legend').innerHTML='';
}
function renderBottom(){
  const sorted=[...G.players].sort((a,b)=>(G.scores[b.id]||0)-(G.scores[a.id]||0));
  document.getElementById('bottom').innerHTML=sorted.map((p,i)=>
    `<div class="bscore${i===0?' leader':''}" style="background:${p.color}22;border-color:${p.color}">
      <div class="bn" style="color:#fff">${p.name}</div>
      <div class="bn" style="color:${p.color};font-size:.58rem;font-weight:800;margin-bottom:2px;letter-spacing:.5px">${p.theme}</div>
      <div class="bp" style="color:${p.color}">${G.scores[p.id]||0}</div>
    </div>`).join('');
}

// ── WINNER ──
function doWinner(cmd){
  document.getElementById('qscreen').classList.remove('show');
  if(cmd.scores)G.scores=cmd.scores;
  const sorted=[...G.players].sort((a,b)=>(G.scores[b.id]||0)-(G.scores[a.id]||0));
  const w=sorted[0];
  document.getElementById('w-name').textContent=w.name.toUpperCase();
  document.getElementById('w-name').style['-webkit-text-fill-color']=w.color;
  document.getElementById('w-sub').textContent=`${G.scores[w.id]} points — Champion de "${w.theme}"`;
  document.getElementById('w-podium').innerHTML=sorted.map((p,i)=>
    `<div class="w-card" style="border-color:${p.color}44;background:${p.color}0d">
      <div class="w-rank">${['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣'][i]||''}</div>
      <div class="w-pname" style="color:${p.color}99">${p.name}</div>
      <div class="w-pts" style="color:${p.color}">${G.scores[p.id]||0}</div>
    </div>`).join('');
  document.getElementById('winner').classList.add('show');
  confetti(w.color);
}

function confetti(mainColor){
  const cols=[mainColor,'#f5c842','#e8a020','#22c55e','#3b82f6','#a855f7','#fff'];
  for(let i=0;i<100;i++){
    setTimeout(()=>{
      const el=document.createElement('div');el.className='cf';
      el.style.cssText=`left:${Math.random()*100}vw;width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*2.5}s;`;
      document.body.appendChild(el);setTimeout(()=>el.remove(),5000);
    },i*35);
  }
}
</script>
